      #   run: dotnet test --no-restore --verbosity normal --filter TestCategory=UIFullTests
      # - name: UI full test
      #   run: dotnet test --no-restore --verbosity normal --filter TestCategory=APIFullTests

  email-notification:

    name: Inform the pipeline has passed
